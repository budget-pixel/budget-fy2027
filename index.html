<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FY 2027 Adopted Budget — Walton County</title>
<link rel="stylesheet" href="assets/style.css">
<link rel="stylesheet" href="assets/header.css">
<link rel="stylesheet" href="assets/sidebar.css">
<link rel="stylesheet" href="assets/flipbook.css">
</head>
<body>

<header id="wc-header">
  <a class="wc-header-logo" href="pages/6989dbbdb4696f0b333f2246.html" aria-label="Go to Home">
    <img src="https://stories.opengov.com/countyofwaltonfl/uploads/c432578eae78-Walton_County_Logo_no_background.png" alt="Walton County logo">
  </a>
  <div class="wc-header-title">FY 2027 Adopted Budget</div>
  <div class="wc-header-icons">
    <button id="wc-search-icon-btn" class="wc-header-icon-btn" type="button" aria-label="Search budget pages">&#128269;</button>
    <button id="wc-menu-icon-btn" class="wc-header-icon-btn" type="button" aria-label="Open navigation menu">&#9776;</button>
  </div>
</header>

<div id="wc-sidebar-overlay"></div>
<aside id="wc-sidebar" aria-label="Budget navigation">
  <div class="wc-sidebar-header">
    <span>Browse Budget</span>
    <button id="wc-sidebar-close" type="button" aria-label="Close navigation">&times;</button>
  </div>
  <div class="wc-sidebar-search">
    <input id="wc-sidebar-search-input" type="search" placeholder="Search pages&hellip;" aria-label="Search budget pages">
  </div>
  <div id="wc-sidebar-sections"></div>
</aside>

<div id="book-wrap" hidden>
  <div id="book"></div>
  <div id="page-counter"></div>
  <button class="wc-flip-btn prev" type="button" aria-label="Previous page">&lsaquo;</button>
  <button class="wc-flip-btn next" type="button" aria-label="Next page">&rsaquo;</button>
</div>

<div id="mobile-wrap" hidden>
  <div id="mobile-content"></div>
  <div id="mobile-bar">
    <button id="mobile-prev" type="button">&lsaquo; Prev</button>
    <span id="mobile-page-counter"></span>
    <button id="mobile-next" type="button">Next &rsaquo;</button>
  </div>
</div>

<script src="assets/pages-data.js"></script>
<script src="assets/content-loader.js"></script>
<script src="assets/sidebar.js"></script>
<script src="assets/flipbook.js"></script>
<script src="assets/mobile-scroll.js"></script>
<script src="assets/mode-switch.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  WCSidebar.init();
  WCModeSwitch.init();

  document.querySelector('.wc-flip-btn.prev').addEventListener('click', function () { WCFlipbook.prev(); });
  document.querySelector('.wc-flip-btn.next').addEventListener('click', function () { WCFlipbook.next(); });

  document.addEventListener('keydown', function (e) {
    var tag = (e.target.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'textarea' || e.target.isContentEditable) return;

    var bookWrap = document.getElementById('book-wrap');
    if (bookWrap.hidden) return;

    if (e.key === 'ArrowRight') WCFlipbook.next();
    if (e.key === 'ArrowLeft') WCFlipbook.prev();
  });
});
</script>
</body>
</html>
