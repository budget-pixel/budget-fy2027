name: Update Census Data

on:
  workflow_dispatch: {}
  schedule:
    # 06:00 UTC on the 1st of every month.
    - cron: "0 6 1 * *"

permissions:
  contents: write

jobs:
  update-census-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; elif [ -f package.json ]; then npm install; fi

      - name: Fetch Census data
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: node scripts/fetch-census-data.js

      - name: Commit updated census data if changed
        run: |
          if git diff --quiet -- assets/census-data.json; then
            echo "No changes to assets/census-data.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/census-data.json
          git commit -m "Update Census data ($(date -u +%Y-%m-%d))"
          git push
