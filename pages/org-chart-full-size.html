<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walton County Organizational Chart</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    body{
      margin:0;
      background:#f4f7f5;
      color:#24344d;
      font-family:Arial, Helvetica, sans-serif;
    }

    .wc-full-chart-page{
      min-height:100vh;
      padding:32px;
      box-sizing:border-box;
    }

    .wc-full-chart-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      max-width:1600px;
      margin:0 auto 20px;
    }

    .wc-full-chart-title{
      margin:0;
      color:#24344d;
      font-size:28px;
      font-weight:800;
      line-height:1.2;
    }

    .wc-full-chart-back{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      padding:11px 18px;
      border-radius:999px;
      background:#006231;
      color:#ffffff !important;
      font-size:15px;
      font-weight:700;
      line-height:1;
      text-decoration:none !important;
      box-shadow:0 5px 12px rgba(0,98,49,.18);
    }

    .wc-full-chart-frame{
      max-width:1600px;
      margin:0 auto;
      padding:18px;
      overflow:auto;
      background:#ffffff;
      border:3px solid #d1be78;
      border-radius:24px;
      box-shadow:0 12px 32px rgba(0,0,0,.12);
      box-sizing:border-box;
    }

    .wc-full-chart-frame img{
      display:block;
      width:1600px;
      max-width:none;
      height:auto;
      border-radius:14px;
    }

    @media (max-width:768px){
      .wc-full-chart-page{
        padding:18px;
      }

      .wc-full-chart-header{
        align-items:flex-start;
        flex-direction:column;
      }

      .wc-full-chart-title{
        font-size:23px;
      }

      .wc-full-chart-back{
        width:100%;
        box-sizing:border-box;
      }

      .wc-full-chart-frame img{
        width:1100px;
      }
    }
  </style>
</head>
<body>
  <main class="wc-full-chart-page">
    <div class="wc-full-chart-header">
      <h1 class="wc-full-chart-title">Walton County Organizational Chart</h1>
      <a class="wc-full-chart-back" href="organizational-structure.html">Back to Organizational Structure</a>
    </div>

    <div class="wc-full-chart-frame">
      <img src="../assets/images/Page Images/walton-county-org-chart.png" alt="Walton County Organizational Chart">
    </div>
  </main>
</body>
</html>
