<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walton County Organizational Chart</title>
  <script>
    (function(){
      try{
        var adminTheme = new URLSearchParams(window.location.search).get("adminTheme");
        if(adminTheme === "dark" || adminTheme === "light"){
          /* Hidden local developer preference only; this is not a public feature or navigation setting. */
          window.localStorage.setItem("waltonBudgetTheme", adminTheme);
        }
        document.documentElement.setAttribute(
          "data-theme",
          window.localStorage.getItem("waltonBudgetTheme") === "dark" ? "dark" : "light"
        );
      }catch(e){}
    })();
  </script>
  <link rel="stylesheet" href="../assets/style.css?v=20260625-chart-wrap-fix">
  <style>
    body{
      margin:0;
      background:#f4f7f5;
      color:#24344d;
      font-family:Arial, Helvetica, sans-serif;
    }

    .wc-full-chart-page{
      min-height:100vh;
      padding:32px;
      box-sizing:border-box;
    }

    .wc-full-chart-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      max-width:1600px;
      margin:0 auto 20px;
    }

    .wc-full-chart-title{
      margin:0;
      color:#24344d;
      font-size:28px;
      font-weight:800;
      line-height:1.2;
    }

    .wc-full-chart-back{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      padding:11px 18px;
      border-radius:999px;
      background:#006231;
      color:#ffffff !important;
      font-size:15px;
      font-weight:700;
      line-height:1;
      text-decoration:none !important;
      box-shadow:0 5px 12px rgba(0,98,49,.18);
    }

    .wc-skip-link{
      position:absolute;
      top:12px;
      left:12px;
      z-index:10000;
      transform:translateY(-160%);
      display:inline-flex;
      align-items:center;
      min-height:44px;
      padding:10px 14px;
      border:2px solid #0b4b3a;
      border-radius:6px;
      background:#ffffff;
      color:#063b2d;
      font:700 15px/1.2 Arial, Helvetica, sans-serif;
      text-decoration:none;
      box-shadow:0 8px 20px rgba(0,0,0,.18);
    }

    .wc-skip-link:focus{
      transform:translateY(0);
      outline:3px solid #d1be78;
      outline-offset:3px;
    }

    .wc-full-chart-frame{
      max-width:1600px;
      margin:0 auto;
      padding:18px;
      overflow:auto;
      background:#ffffff;
      border:3px solid #d1be78;
      border-radius:24px;
      box-shadow:0 12px 32px rgba(0,0,0,.12);
      box-sizing:border-box;
    }

    .wc-full-chart-frame img{
      display:block;
      width:1600px;
      max-width:none;
      height:auto;
      border-radius:14px;
    }

    @media (max-width:768px){
      .wc-full-chart-page{
        padding:18px;
      }

      .wc-full-chart-header{
        align-items:flex-start;
        flex-direction:column;
      }

      .wc-full-chart-title{
        font-size:23px;
      }

      .wc-full-chart-back{
        width:100%;
        box-sizing:border-box;
      }

      .wc-full-chart-frame img{
        width:1100px;
      }
    }
  </style>
</head>
<body>
  <a class="wc-skip-link" href="#main-content">Skip to main content</a>
  <main id="main-content" class="wc-full-chart-page" tabindex="-1">
    <div class="wc-full-chart-header">
      <h1 class="wc-full-chart-title">Walton County Organizational Chart</h1>
      <a class="wc-full-chart-back" href="organizational-structure.html">Back to Organizational Structure</a>
    </div>

    <div class="wc-full-chart-frame">
      <img src="../assets/images/Page Images/walton-county-org-chart.png" alt="Walton County Organizational Chart">
    </div>
  </main>
</body>
</html>
