    function escapeHtml(value){
      return String(value === undefined || value === null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

      var host = document.getElementById("tocSections");
      if(!host) return;
      host.innerHTML = sections.map(function(section, sectionIndex){
        var headingId = "toc-section-" + sectionIndex;
        return '<section class="wc-toc-section" aria-labelledby="' + headingId + '">' +
          '<h2 id="' + headingId + '">' + escapeHtml(section.title) + '</h2>' +
          '<ul class="wc-toc-list">' +
            section.pages.map(function(page){

                '<span class="wc-toc-number" aria-hidden="true"></span>' +
                '<span><span class="wc-toc-title">' + escapeHtml(page.title) + '</span>' +
                '<span class="wc-toc-desc">' + escapeHtml(page.description) + '</span></span>' +
                '<span class="wc-toc-arrow" aria-hidden="true">&rarr;</span>' +
              '</a></li>';
            }).join("") +
          '</ul>' +
        '</section>';
