<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Constitutional Officers — Walton County FY 2027 Budget</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<!-- nav#nav-menu.nav-menu is the hook walton-budget-nav.js uses for logo + search injection -->
<nav id="nav-menu" class="nav-menu">
  <div class="logo-container"></div>
</nav>

<div id="layout">
<main id="content">

<div class="page-eyebrow">Constitutional Officers</div>
<h1 class="page-title">Constitutional Officers</h1>
<p class="page-intro">Explore Walton County's independently elected constitutional officers, their budgets, staffing, and services.</p>

<section aria-label="Constitutional Officers directory">
  <ul class="wc-directory-list" id="officerList"></ul>
</section>

</main>
</div>

<script src="../assets/walton-budget-search-data.js"></script>
<script src="../assets/budget-data.js"></script>
<script src="../assets/walton-budget-nav.js"></script>
<script src="../assets/walton-budget-pdf.js"></script>
<script>
  (function(){
    var fallbackOfficers = [
      ["Board of County Commissioners", "board-of-county-commissioners.html"],
      ["Clerk of Courts & County Comptroller", "clerk-of-courts-and-county-comptroller.html"],
      ["Property Appraiser", "property-appraiser.html"],
      ["Sheriff's Office", "sheriffs-office.html"],
      ["Supervisor of Elections", "supervisor-of-elections.html"],
      ["Tax Collector", "tax-collector.html"]
    ];

    var aliasMap = {
      "sheriffs office": ["walton county sheriffs office", "sheriff"],
      "clerk of courts and county comptroller": ["clerk of court", "clerk of circuit court"]
    };

    var officers = [];

    function $(selector){
      return document.querySelector(selector);
    }

    function escapeHtml(value){
      return String(value === undefined || value === null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function normalize(value){
      return String(value || "")
        .toLowerCase()
        .replace(/&/g, " and ")
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function formatCurrency(value){
      var n = Number(value) || 0;
      if(!n) return "Not listed";
      if(Math.abs(n) >= 1000000){
        return "$" + (n / 1000000).toLocaleString("en-US", { maximumFractionDigits:1 }) + "M";
      }
      return "$" + Math.round(n).toLocaleString("en-US");
    }

    function formatFte(value){
      var n = Number(value) || 0;
      if(!n) return "Not listed";
      return n.toLocaleString("en-US", { maximumFractionDigits:2 }).replace(/\.00$/, "");
    }

    function descriptionFromNarrative(text){
      var clean = String(text || "").replace(/\s+/g, " ").trim();
      if(!clean) return "View budget, staffing, performance measures, and service information for this constitutional officer.";
      return clean.length > 190 ? clean.slice(0, 187).replace(/\s+\S*$/, "") + "..." : clean;
    }

    function aliasesFor(name){
      var key = normalize(name);
      return [key].concat(aliasMap[key] || []);
    }

    function rowMatchesOfficer(row, name){
      var dept = normalize(row && row.Dept_Name);
      return aliasesFor(name).indexOf(dept) !== -1;
    }

    function buildBaseOfficers(){
      var pages = Array.isArray(window.wcBudgetPages) ? window.wcBudgetPages : [];
      var items = pages
        .filter(function(page){
          return page && page.section === "Constitutional Officers";
        })
        .map(function(page){
          return { name:page.title, href:page.href };
        });

      if(!items.length){
        items = fallbackOfficers.map(function(item){
          return { name:item[0], href:item[1] };
        });
      }

      var seen = {};
      return items
        .filter(function(item){
          var key = normalize(item.name);
          if(seen[key]) return false;
          seen[key] = true;
          return true;
        })
        .sort(function(a, b){ return a.name.localeCompare(b.name); });
    }

    function enrichOfficers(data){
      var narratives = Array.isArray(data && data.departmentNarratives) ? data.departmentNarratives : [];
      var expenditures = Array.isArray(data && data.expenditures) ? data.expenditures : [];
      var staffing = Array.isArray(data && data.staffing) ? data.staffing : [];

      officers = buildBaseOfficers().map(function(officer){
        var narrative = narratives.find(function(row){ return rowMatchesOfficer(row, officer.name); });
        var budget = expenditures.reduce(function(sum, row){
          return rowMatchesOfficer(row, officer.name) ? sum + (Number(row.FY2027_Proposed) || 0) : sum;
        }, 0);
        var fte = staffing.reduce(function(sum, row){
          return rowMatchesOfficer(row, officer.name) ? sum + (Number(row["2027"]) || 0) : sum;
        }, 0);

        return {
          name:officer.name,
          href:officer.href,
          description:descriptionFromNarrative(narrative && narrative.Narrative),
          budget:formatCurrency(budget),
          fte:formatFte(fte)
        };
      });
    }

    function renderOfficers(){
      var list = $("#officerList");

      list.innerHTML = officers.map(function(officer){
        return '<li><a class="wc-directory-item" href="' + escapeHtml(officer.href) + '">' +
          '<div class="wc-directory-item-main">' +
            '<span class="wc-directory-item-title">' + escapeHtml(officer.name) + '</span>' +
            '<span class="wc-directory-item-desc">' + escapeHtml(officer.description) + '</span>' +
          '</div>' +
          '<div class="wc-directory-item-meta">' +
            '<div class="wc-directory-item-stat"><strong>' + escapeHtml(officer.budget) + '</strong><span>FY 2027 Budget</span></div>' +
            '<div class="wc-directory-item-stat"><strong>' + escapeHtml(officer.fte) + '</strong><span>Personnel</span></div>' +
          '</div>' +
          '<span class="wc-directory-item-arrow" aria-hidden="true">&rarr;</span>' +
        '</a></li>';
      }).join("");
    }

    function initDirectory(){
      officers = buildBaseOfficers().map(function(officer){
        return {
          name:officer.name,
          href:officer.href,
          description:descriptionFromNarrative(""),
          budget:"Loading",
          fte:"Loading"
        };
      });
      renderOfficers();

      if(window.WCBudgetData && typeof window.WCBudgetData.loadBudgetData === "function"){
        window.WCBudgetData.loadBudgetData()
          .then(function(data){
            enrichOfficers(data);
            renderOfficers();
          })
          .catch(function(){
            officers = officers.map(function(officer){
              officer.budget = "Not listed";
              officer.fte = "Not listed";
              return officer;
            });
            renderOfficers();
          });
      }
    }

    document.addEventListener("DOMContentLoaded", initDirectory);
  })();
</script>
</body>
</html>
