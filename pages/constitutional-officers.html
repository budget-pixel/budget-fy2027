<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Constitutional Officers & Other Agencies — Walton County FY 2027 Budget</title>
<link rel="stylesheet" href="../assets/style.css?v=20260625-chart-wrap-fix">
</head>
<body>

<!-- nav#nav-menu.nav-menu is the hook walton-budget-nav.js uses for logo + search injection -->
<nav id="nav-menu" class="nav-menu">
  <div class="logo-container"></div>
</nav>

<div id="layout">
<main id="content">

<div class="page-eyebrow">Constitutional Officers & Other Agencies</div>
<h1 class="page-title">Constitutional Officers & Other Agencies</h1>
<p class="page-intro">Explore Walton County's independently elected constitutional officers and autonomous entities, their budgets, staffing, and services.</p>

<section aria-label="Constitutional Officers directory" class="page-text">
  <h2>Constitutional Officers</h2>
  <ul class="wc-directory-list" id="officerList"></ul>
</section>

<section aria-label="Other Agencies directory" class="page-text" style="margin-top:40px;">
  <h2>Other Agencies</h2>
  <ul class="wc-directory-list" id="entityList"></ul>
</section>

</main>
</div>

<script src="../assets/walton-budget-search-data.js"></script>
<script src="../assets/budget-data.js?v=20260622-fixed-category-order"></script>
<script src="../assets/walton-budget-nav.js?v=20260622-search-dot-cleanup"></script>
<script src="../assets/walton-budget-pdf.js"></script>
<script>
  (function(){
    var GROUPS = [
      {
        listId:"officerList",
        section:"Constitutional Officers",
        fallback:[
          ["Board of County Commissioners", "board-of-county-commissioners.html"],
          ["Clerk of Courts & County Comptroller", "clerk-of-courts-and-county-comptroller.html"],
          ["Property Appraiser", "property-appraiser.html"],
          ["Sheriff's Office", "sheriffs-office.html"],
          ["Supervisor of Elections", "supervisor-of-elections.html"],
          ["Tax Collector", "tax-collector.html"]
        ],
        aliasMap:{
          "sheriff s office": ["walton county sheriff s office", "walton county sheriffs office", "sheriff"],
          "sheriffs office": ["walton county sheriff s office", "walton county sheriffs office", "sheriff"],
          "clerk of courts and county comptroller": ["clerk of court", "clerk of circuit court"]
        },
        defaultDescription:"View budget, staffing, performance measures, and service information for this constitutional officer."
      },
      {
        listId:"entityList",
        section:"Autonomous Entities",
        fallback:[
          ["Circuit Court", "circuit-court.html"],
          ["County Court", "county-court.html"],
          ["Court Technology & Innovations", "court-technology-and-innovations.html"],
          ["Guardian Ad Litem", "guardian-ad-litem.html"],
          ["Medical Examiner", "medical-examiner.html"],
          ["Non-Profit Funding Program", "non-profit-funding-program.html"],
          ["Public Defender", "public-defender.html"],
          ["South Walton Fire & State Control", "south-walton-fire-and-state-control.html"],
          ["State Attorney", "state-attorney.html"],
          ["Statutory & Other Agency Funding", "statutory-and-other-agency-funding.html"],
          ["Walton County Health Department", "walton-county-health-department.html"]
        ],
        aliasMap:{
          "court technology and innovations": [
            "court technology innovations",
            "court technology court administration",
            "court technology state attorney",
            "court technology public defender",
            "court technology",
            "court innovations"
          ],
          "south walton fire and state control": ["south walton fire", "state fire"],
          "statutory and other agency funding": [
            "statutory and other agency fund",
            "statutory other agency funding",
            "statutory other agency fund",
            "statutory and other",
            "statutory other"
          ]
        },
        defaultDescription:"View budget, staffing, performance measures, and service information for this entity."
      }
    ];

    function $(selector){
      return document.querySelector(selector);
    }

    function escapeHtml(value){
      return String(value === undefined || value === null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function normalize(value){
      return String(value || "")
        .toLowerCase()
        .replace(/&/g, " and ")
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function formatCurrency(value){
      var n = Number(value) || 0;
      if(!n) return "Not listed";
      if(Math.abs(n) >= 1000000){
        return "$" + (n / 1000000).toLocaleString("en-US", { maximumFractionDigits:1 }) + "M";
      }
      return "$" + Math.round(n).toLocaleString("en-US");
    }

    function formatFte(value){
      var n = Number(value) || 0;
      if(!n) return "Not listed";
      return n.toLocaleString("en-US", { maximumFractionDigits:2 }).replace(/\.00$/, "");
    }

    function formatTrend(current, prior){
      if(!prior) return "";
      var pct = ((current - prior) / prior) * 100;
      return (pct > 0 ? "+" : "") + pct.toFixed(2) + "%";
    }

    function descriptionFromNarrative(text, fallback){
      var clean = String(text || "").replace(/\s+/g, " ").trim();
      if(!clean) return fallback;
      return clean.length > 190 ? clean.slice(0, 187).replace(/\s+\S*$/, "") + "..." : clean;
    }

    function aliasesFor(name, aliasMap){
      var key = normalize(name);
      return [key].concat(aliasMap[key] || []);
    }

    function rowMatches(row, name, aliasMap){
      var dept = normalize(row && row.Dept_Name);
      return aliasesFor(name, aliasMap).indexOf(dept) !== -1;
    }

    function fundCodeForRow(row){
      return String((row && row.Dept_Code) || "").trim().slice(0, 3);
    }

    function fundLabelForItem(budgetRows, fundsByCode){
      var codes = [];
      budgetRows.forEach(function(row){
        // Skip rows with no FY2027 budget of their own (e.g. a legacy-fund
        // placeholder kept only so historical actuals stay visible -- see
        // DEPT_CODE_ACTUALS_ALIASES' comment in budget-data.js), so the
        // fund shown stays in sync with the FY2027 budget figure shown.
        if(!(Number(row.FY2027_Proposed) || 0)) return;
        var code = fundCodeForRow(row);
        if(code && codes.indexOf(code) === -1) codes.push(code);
      });
      if(!codes.length) return "Not listed";
      return codes
        .map(function(code){
          var fund = fundsByCode[code];
          return fund && fund.Fund_Name ? fund.Fund_Name : code;
        })
        .sort()
        .join(", ");
    }

    function expenditureRowsForItem(rows, item, group){
      if(normalize(item.name) === "statutory and other agency funding"){
        return rows.filter(function(row){
          return String(row && row.Note || "").trim() === "Statutory & Other";
        });
      }
      return rows.filter(function(row){
        return rowMatches(row, item.name, group.aliasMap);
      });
    }

    // Prior-year (FY2026_Original_Budget) totals need the deduped expense
    // rows -- some entities split one Dept_Code across multiple
    // display-only Dept_Names (e.g. Court Technology & Innovations' several
    // sub-programs) that each carry the *same* full original-budget total
    // for a shared account (see applyOriginalBudgetToRows in budget-data.js),
    // so summing the raw rows would double-count it once per Dept_Name
    // sharing it. Statutory & Other's Note-based filter doesn't apply to
    // deduped rows (Note isn't part of their merge key), so it keeps using
    // the raw rows -- its many recipients already sit on distinct
    // Project_Codes, which are part of that grain, so they don't collapse.
    function priorBudgetRowsForItem(dedupedRows, rawRows, item, group){
      if(normalize(item.name) === "statutory and other agency funding"){
        return rawRows.filter(function(row){
          return String(row && row.Note || "").trim() === "Statutory & Other";
        });
      }
      return dedupedRows.filter(function(row){
        return rowMatches(row, item.name, group.aliasMap);
      });
    }

    function buildBaseItems(group){
      var pages = Array.isArray(window.wcBudgetPages) ? window.wcBudgetPages : [];
      var localHrefByTitle = {};
      group.fallback.forEach(function(item){
        localHrefByTitle[normalize(item[0])] = item[1];
      });
      var items = pages
        .filter(function(page){
          return page &&
            page.section === group.section &&
            page.title !== "Constitutional Officers & Other Agencies";
        })
        .map(function(page){
          return { name:page.title, href:localHrefByTitle[normalize(page.title)] || page.href };
        });

      if(!items.length){
        items = group.fallback.map(function(item){
          return { name:item[0], href:item[1] };
        });
      }

      var seen = {};
      return items
        .filter(function(item){
          var key = normalize(item.name);
          if(seen[key]) return false;
          seen[key] = true;
          return true;
        })
        .sort(function(a, b){ return a.name.localeCompare(b.name); });
    }

    function enrichItems(group, baseItems, data){
      var narratives = Array.isArray(data && data.departmentNarratives) ? data.departmentNarratives : [];
      var expenditures = Array.isArray(data && data.expenditures) ? data.expenditures : [];
      var dedupedExpenditures = Array.isArray(data && data.dedupedExpenseRows) ? data.dedupedExpenseRows : expenditures;
      var staffing = Array.isArray(data && data.staffing) ? data.staffing : [];
      var funds = Array.isArray(data && data.funds) ? data.funds : [];
      var fundsByCode = {};
      funds.forEach(function(fund){
        if(fund && fund.Fund_Code) fundsByCode[fund.Fund_Code] = fund;
      });

      return baseItems.map(function(item){
        var narrative = narratives.find(function(row){ return rowMatches(row, item.name, group.aliasMap); });
        var budgetRows = expenditureRowsForItem(expenditures, item, group);
        var budget = budgetRows.reduce(function(sum, row){
          return sum + (Number(row.FY2027_Proposed) || 0);
        }, 0);
        var priorBudget = priorBudgetRowsForItem(dedupedExpenditures, expenditures, item, group).reduce(function(sum, row){
          return sum + (Number(row.FY2026_Original_Budget) || 0);
        }, 0);
        var fte = staffing.reduce(function(sum, row){
          return rowMatches(row, item.name, group.aliasMap) ? sum + (Number(row["2027"]) || 0) : sum;
        }, 0);

        return {
          name:item.name,
          href:item.href,
          description:descriptionFromNarrative(narrative && narrative.Narrative, group.defaultDescription),
          budget:formatCurrency(budget),
          trend:formatTrend(budget, priorBudget),
          fte:formatFte(fte),
          fund:fundLabelForItem(budgetRows, fundsByCode)
        };
      });
    }

    function renderItems(group, items){
      var list = $("#" + group.listId);
      if(!list) return;

      list.innerHTML = items.map(function(item){
        var personnelStat = item.fte === "Not listed" ? "" :
          '<div class="wc-directory-item-stat"><strong>' + escapeHtml(item.fte) + '</strong><span>Personnel</span></div>';
        var fundStat = !item.fund || item.fund === "Not listed" ? "" :
          '<div class="wc-directory-item-stat"><strong>' + escapeHtml(item.fund) + '</strong><span>Fund</span></div>';
        var trendStat = !item.trend ? "" :
          '<div class="wc-directory-item-stat"><strong class="' + (item.trend.charAt(0) === "-" ? "wc-directory-item-trend-down" : "wc-directory-item-trend-up") + '">' + escapeHtml(item.trend) + '</strong><span>YoY Change</span></div>';
        return '<li><a class="wc-directory-item" href="' + escapeHtml(item.href) + '">' +
          '<div class="wc-directory-item-main">' +
            '<span class="wc-directory-item-title">' + escapeHtml(item.name) + '</span>' +
            '<span class="wc-directory-item-desc">' + escapeHtml(item.description) + '</span>' +
          '</div>' +
          '<div class="wc-directory-item-meta">' +
            fundStat +
            '<div class="wc-directory-item-stat"><strong>' + escapeHtml(item.budget) + '</strong><span>FY 2027 Budget</span></div>' +
            trendStat +
            personnelStat +
          '</div>' +
          '<span class="wc-directory-item-arrow" aria-hidden="true">&rarr;</span>' +
        '</a></li>';
      }).join("");
    }

    function initDirectory(){
      var groupItems = GROUPS.map(function(group){
        var baseItems = buildBaseItems(group);
        var loadingItems = baseItems.map(function(item){
          return {
            name:item.name,
            href:item.href,
            description:descriptionFromNarrative("", group.defaultDescription),
            budget:"Loading",
            fte:"Loading",
            fund:"Loading"
          };
        });
        renderItems(group, loadingItems);
        return { group:group, baseItems:baseItems };
      });

      if(window.WCBudgetData && typeof window.WCBudgetData.loadBudgetData === "function"){
        window.WCBudgetData.loadBudgetData()
          .then(function(data){
            groupItems.forEach(function(entry){
              renderItems(entry.group, enrichItems(entry.group, entry.baseItems, data));
            });
          })
          .catch(function(){
            groupItems.forEach(function(entry){
              renderItems(entry.group, entry.baseItems.map(function(item){
                return {
                  name:item.name,
                  href:item.href,
                  description:descriptionFromNarrative("", entry.group.defaultDescription),
                  budget:"Not listed",
                  fte:"Not listed",
                  fund:"Not listed"
                };
              }));
            });
          });
      }
    }

    document.addEventListener("DOMContentLoaded", initDirectory);
  })();
</script>
</body>
</html>
