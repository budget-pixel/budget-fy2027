<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Autonomous Entities — Walton County FY 2027 Budget</title>
<link rel="stylesheet" href="../assets/style.css?v=20260622-itemized-prior-summary">
</head>
<body>

<!-- nav#nav-menu.nav-menu is the hook walton-budget-nav.js uses for logo + search injection -->
<nav id="nav-menu" class="nav-menu">
  <div class="logo-container"></div>
</nav>

<div id="layout">
<main id="content">

<div class="page-eyebrow">Autonomous Entities</div>
<h1 class="page-title">Autonomous Entities</h1>
<p class="page-intro">Explore Walton County's autonomous entities and statutorily funded agencies, their budgets, staffing, and services.</p>

<section aria-label="Autonomous Entities directory">
  <ul class="wc-directory-list" id="entityList"></ul>
</section>

</main>
</div>

<script src="../assets/walton-budget-search-data.js"></script>
<script src="../assets/budget-data.js?v=20260622-fund-schedule-dynamic-funds"></script>
<script src="../assets/walton-budget-nav.js?v=20260622-search-dot-cleanup"></script>
<script src="../assets/walton-budget-pdf.js"></script>
<script>
  (function(){
    var fallbackEntities = [
      ["Circuit Court", "circuit-court.html"],
      ["County Court", "county-court.html"],
      ["Court Technology & Innovations", "court-technology-and-innovations.html"],
      ["Guardian Ad Litem", "guardian-ad-litem.html"],
      ["Medical Examiner", "medical-examiner.html"],
      ["Non-Profit Funding Program", "non-profit-funding-program.html"],
      ["Public Defender", "public-defender.html"],
      ["South Walton Fire & State Control", "south-walton-fire-and-state-control.html"],
      ["State Attorney", "state-attorney.html"],
      ["Statutory & Other Agency Funding", "statutory-and-other-agency-funding.html"],
      ["Walton County Health Department", "walton-county-health-department.html"]
    ];

    var aliasMap = {
      "court technology and innovations": ["court technology innovations"],
      "statutory and other agency funding": ["statutory other agency funding"]
    };

    var entities = [];

    function $(selector){
      return document.querySelector(selector);
    }

    function escapeHtml(value){
      return String(value === undefined || value === null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function normalize(value){
      return String(value || "")
        .toLowerCase()
        .replace(/&/g, " and ")
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function formatCurrency(value){
      var n = Number(value) || 0;
      if(!n) return "Not listed";
      if(Math.abs(n) >= 1000000){
        return "$" + (n / 1000000).toLocaleString("en-US", { maximumFractionDigits:1 }) + "M";
      }
      return "$" + Math.round(n).toLocaleString("en-US");
    }

    function formatFte(value){
      var n = Number(value) || 0;
      if(!n) return "Not listed";
      return n.toLocaleString("en-US", { maximumFractionDigits:2 }).replace(/\.00$/, "");
    }

    function descriptionFromNarrative(text){
      var clean = String(text || "").replace(/\s+/g, " ").trim();
      if(!clean) return "View budget, staffing, performance measures, and service information for this entity.";
      return clean.length > 190 ? clean.slice(0, 187).replace(/\s+\S*$/, "") + "..." : clean;
    }

    function aliasesFor(name){
      var key = normalize(name);
      return [key].concat(aliasMap[key] || []);
    }

    function rowMatchesEntity(row, name){
      var dept = normalize(row && row.Dept_Name);
      return aliasesFor(name).indexOf(dept) !== -1;
    }

    function buildBaseEntities(){
      var pages = Array.isArray(window.wcBudgetPages) ? window.wcBudgetPages : [];
      var items = pages
        .filter(function(page){
          return page && page.section === "Autonomous Entities";
        })
        .map(function(page){
          return { name:page.title, href:page.href };
        });

      if(!items.length){
        items = fallbackEntities.map(function(item){
          return { name:item[0], href:item[1] };
        });
      }

      var seen = {};
      return items
        .filter(function(item){
          var key = normalize(item.name);
          if(seen[key]) return false;
          seen[key] = true;
          return true;
        })
        .sort(function(a, b){ return a.name.localeCompare(b.name); });
    }

    function enrichEntities(data){
      var narratives = Array.isArray(data && data.departmentNarratives) ? data.departmentNarratives : [];
      var expenditures = Array.isArray(data && data.expenditures) ? data.expenditures : [];
      var staffing = Array.isArray(data && data.staffing) ? data.staffing : [];

      entities = buildBaseEntities().map(function(entity){
        var narrative = narratives.find(function(row){ return rowMatchesEntity(row, entity.name); });
        var budget = expenditures.reduce(function(sum, row){
          return rowMatchesEntity(row, entity.name) ? sum + (Number(row.FY2027_Proposed) || 0) : sum;
        }, 0);
        var fte = staffing.reduce(function(sum, row){
          return rowMatchesEntity(row, entity.name) ? sum + (Number(row["2027"]) || 0) : sum;
        }, 0);

        return {
          name:entity.name,
          href:entity.href,
          description:descriptionFromNarrative(narrative && narrative.Narrative),
          budget:formatCurrency(budget),
          fte:formatFte(fte)
        };
      });
    }

    function renderEntities(){
      var list = $("#entityList");

      list.innerHTML = entities.map(function(entity){
        return '<li><a class="wc-directory-item" href="' + escapeHtml(entity.href) + '">' +
          '<div class="wc-directory-item-main">' +
            '<span class="wc-directory-item-title">' + escapeHtml(entity.name) + '</span>' +
            '<span class="wc-directory-item-desc">' + escapeHtml(entity.description) + '</span>' +
          '</div>' +
          '<div class="wc-directory-item-meta">' +
            '<div class="wc-directory-item-stat"><strong>' + escapeHtml(entity.budget) + '</strong><span>FY 2027 Budget</span></div>' +
            '<div class="wc-directory-item-stat"><strong>' + escapeHtml(entity.fte) + '</strong><span>Personnel</span></div>' +
          '</div>' +
          '<span class="wc-directory-item-arrow" aria-hidden="true">&rarr;</span>' +
        '</a></li>';
      }).join("");
    }

    function initDirectory(){
      entities = buildBaseEntities().map(function(entity){
        return {
          name:entity.name,
          href:entity.href,
          description:descriptionFromNarrative(""),
          budget:"Loading",
          fte:"Loading"
        };
      });
      renderEntities();

      if(window.WCBudgetData && typeof window.WCBudgetData.loadBudgetData === "function"){
        window.WCBudgetData.loadBudgetData()
          .then(function(data){
            enrichEntities(data);
            renderEntities();
          })
          .catch(function(){
            entities = entities.map(function(entity){
              entity.budget = "Not listed";
              entity.fte = "Not listed";
              return entity;
            });
            renderEntities();
          });
      }
    }

    document.addEventListener("DOMContentLoaded", initDirectory);
  })();
</script>
</body>
</html>
