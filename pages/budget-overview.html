<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Budget Overview — Walton County FY 2027 Budget</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<!-- nav#nav-menu.nav-menu is the hook walton-budget-nav.js uses for logo + search injection -->
<nav id="nav-menu" class="nav-menu">
  <div class="logo-container"></div>
</nav>

<div id="layout">
<main id="content">

<div class="page-eyebrow">Budget Overview</div>
<h1 class="page-title">Budget Overview</h1>
<p class="page-intro">Explore the FY 2027 proposed budget, county priorities, organizational structure, financial policies, and the process that guides Walton County's annual budget.</p>

<section aria-label="Budget overview directory">
  <div class="wc-directory-tools">
    <label class="wc-directory-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35m0 0A7.5 7.5 0 1 0 6.15 6.15a7.5 7.5 0 0 0 10.5 10.5Z"></path>
      </svg>
      <input id="hubSearch" type="search" placeholder="Search Budget Overview..." autocomplete="off" aria-label="Search budget overview">
    </label>
    <div class="wc-directory-count" id="hubResultCount">Loading overview pages</div>
  </div>
  <div class="wc-directory-empty" id="hubEmpty">No overview pages match that search.</div>
  <ul class="wc-directory-list" id="hubList"></ul>
</section>

</main>
</div>

<script src="../assets/walton-budget-search-data.js"></script>
<script src="../assets/budget-data.js"></script>
<script src="../assets/walton-budget-nav.js"></script>
<script src="../assets/walton-budget-pdf.js"></script>
<script>
  (function(){
    var pages = [
      {
        title:"GFOA Distinguished Budget Presentation Award",
        href:"gfoa-distinguished-budget-presentation-award.html",
        label:"Recognition",
        description:"Review the award standards and presentation recognition for Walton County's budget document."
      },
      {
        title:"Transmittal Letter",
        href:"transmittal-letter.html",
        label:"Executive Message",
        description:"Read the budget message introducing major priorities, financial conditions, and recommendations."
      },
      {
        title:"Budget Process & Calendar",
        href:"budget-process-and-calendar.html",
        label:"Process",
        description:"Follow the annual budget development timeline, hearings, adoption milestones, and key dates."
      },
      {
        title:"Fund Descriptions and Structure",
        href:"fund-descriptions-and-structure.html",
        label:"Fund Structure",
        description:"Understand the County's fund accounting structure and how resources are organized."
      },
      {
        title:"Department to Fund Relationship",
        href:"department-to-fund-relationship.html",
        label:"Funding Map",
        description:"See which funds support departments, offices, programs, and recurring services."
      },
      {
        title:"Financial Policies",
        href:"financial-policies.html",
        label:"Fiscal Policy",
        description:"Review policies for budgeting, reserves, fund balance, debt, investment, and fiscal stewardship."
      }
    ];

    function $(selector){
      return document.querySelector(selector);
    }

    function escapeHtml(value){
      return String(value === undefined || value === null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function normalize(value){
      return String(value || "")
        .toLowerCase()
        .replace(/&/g, " and ")
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function renderHub(){
      var query = normalize($("#hubSearch").value);
      var matches = pages.filter(function(page){
        return !query || normalize(page.title + " " + page.label + " " + page.description).indexOf(query) !== -1;
      });
      $("#hubResultCount").textContent = matches.length + " of " + pages.length + " pages";
      $("#hubEmpty").classList.toggle("is-visible", matches.length === 0);
      $("#hubList").innerHTML = matches.map(function(page){
        return '<li><a class="wc-directory-item" href="' + escapeHtml(page.href) + '">' +
          '<div class="wc-directory-item-main">' +
            '<span class="wc-directory-item-title">' + escapeHtml(page.title) + '</span>' +
            '<span class="wc-directory-item-desc">' + escapeHtml(page.description) + '</span>' +
          '</div>' +
          '<span class="wc-directory-item-arrow" aria-hidden="true">&rarr;</span>' +
        '</a></li>';
      }).join("");
    }

    document.addEventListener("DOMContentLoaded", function(){
      renderHub();
      $("#hubSearch").addEventListener("input", renderHub);
    });
  })();
</script>
</body>
</html>
