<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Budget Overview — Walton County FY 2027 Budget</title>
<link rel="stylesheet" href="../assets/style.css?v=20260622-itemized-prior-summary">
</head>
<body>

<!-- nav#nav-menu.nav-menu is the hook walton-budget-nav.js uses for logo + search injection -->
<nav id="nav-menu" class="nav-menu">
  <div class="logo-container"></div>
</nav>

<div id="layout">
<main id="content">

<div class="page-eyebrow">Budget Overview</div>
<h1 class="page-title">Budget Overview</h1>
<p class="page-intro">Explore the proposed budget, county priorities, organizational structure, financial policies, and the process that guides Walton County's annual budget.</p>

<section aria-label="Budget overview directory">
  <ul class="wc-directory-list" id="hubList"></ul>
</section>

</main>
</div>

<script src="../assets/walton-budget-search-data.js"></script>
<script src="../assets/budget-data.js?v=20260622-fund-schedule-dynamic-funds"></script>
<script src="../assets/walton-budget-nav.js?v=20260622-search-dot-cleanup"></script>
<script src="../assets/walton-budget-pdf.js"></script>
<script>
  (function(){
    var pages = [
      {
        title:"Table of Contents",
        href:"table-of-contents.html",
        label:"Guide",
        description:"Start here for a complete guide to the budget pages, directories, schedules, departments, capital projects, and financial summaries."
      },
      {
        title:"GFOA Distinguished Budget Presentation Award",
        href:"gfoa-distinguished-budget-presentation-award.html",
        label:"Recognition",
        description:"Review the award standards and presentation recognition for Walton County's budget document."
      },
      {
        title:"Transmittal Letter",
        href:"transmittal-letter.html",
        label:"Executive Message",
        description:"Read the budget message introducing major priorities, financial conditions, and recommendations."
      },
      {
        title:"Budget Process",
        href:"budget-process-and-calendar.html",
        label:"Process",
        description:"Understand how department requests, review, workshops, public hearings, and adoption fit together."
      },
      {
        title:"Budget Calendar",
        href:"budget-calendar.html",
        label:"Calendar",
        description:"Follow key budget dates, public workshops, TRIM notices, hearings, and adoption milestones."
      },
      {
        title:"Fund Descriptions and Structure",
        href:"fund-descriptions-and-structure.html",
        label:"Fund Structure",
        description:"Understand the County's fund accounting structure and how resources are organized."
      },
      {
        title:"Department to Fund Relationship",
        href:"department-to-fund-relationship.html",
        label:"Funding Map",
        description:"See which funds support departments, offices, programs, and recurring services."
      },
      {
        title:"Financial Policies",
        href:"financial-policies.html",
        label:"Fiscal Policy",
        description:"Review policies for budgeting, reserves, fund balance, debt, investment, and fiscal stewardship."
      }
    ];

    function $(selector){
      return document.querySelector(selector);
    }

    function escapeHtml(value){
      return String(value === undefined || value === null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderHub(){
      $("#hubList").innerHTML = pages.map(function(page){
        return '<li><a class="wc-directory-item" href="' + escapeHtml(page.href) + '">' +
          '<div class="wc-directory-item-main">' +
            '<span class="wc-directory-item-title">' + escapeHtml(page.title) + '</span>' +
            '<span class="wc-directory-item-desc">' + escapeHtml(page.description) + '</span>' +
          '</div>' +
          '<span class="wc-directory-item-arrow" aria-hidden="true">&rarr;</span>' +
        '</a></li>';
      }).join("");
    }

    document.addEventListener("DOMContentLoaded", renderHub);
  })();
</script>
</body>
</html>
