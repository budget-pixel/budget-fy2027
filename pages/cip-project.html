<style>

  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    background:#f4f7f5;
    font-family:Arial, Helvetica, sans-serif;
    color:#172033;
  }

  .wc-project-page{
    width:100%;
    max-width:1040px;
    margin:0 auto;
    padding:28px 22px 56px;
  }

  .wc-project-actions{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    flex-wrap:wrap;
    margin-bottom:16px;
  }

  .wc-project-back,
  .wc-project-full-search{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    min-height:36px;
    padding:8px 13px;
    border-radius:999px;
    text-decoration:none;
    font-size:13px;
    font-weight:700;
    transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
  }

  .wc-project-back{
    color:#006231;
    background:#ffffff;
    border:1px solid rgba(0,98,49,0.14);
  }

  .wc-project-full-search{
    color:#ffffff;
    background:#006231;
    border:1px solid #006231;
    box-shadow:0 8px 18px rgba(0,98,49,0.16);
  }

  .wc-project-back:hover,
  .wc-project-full-search:hover{
    transform:translateY(-1px);
  }

  .wc-project-category{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(0,98,49,0.08);
    color:#006231;
    font-size:12px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin-bottom:18px;
  }

  .wc-project-hero-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    margin-bottom:18px;
  }

  .wc-project-hero-top .wc-project-category{
    margin-bottom:0;
  }

  .wc-project-hero{
    background:#ffffff;
    border-radius:16px;
    padding:24px 28px;
    margin-bottom:18px;
    border:1px solid rgba(209,190,120,0.34);
    box-shadow:
      0 18px 44px rgba(0,98,49,0.08),
      0 6px 14px rgba(36,52,77,0.06);
  }

  .wc-project-title{
    margin:0;
    font-size:34px;
    line-height:1.12;
    font-weight:800;
    color:#172033;
  }

  .wc-project-description{
    font-size:15px;
    line-height:1.62;
    color:#5a6e7f;
    max-width:920px;
  }

  .wc-project-overview-text{
    font-size:14px;
    line-height:1.62;
    color:#5a6e7f;
    text-align:justify;
    text-justify:inter-word;
  }

  .wc-project-image-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:12px;
  }

  .wc-project-image-card{
    margin:0;
    overflow:hidden;
    border-radius:12px;
    background:#f4f7f5;
    border:1px solid rgba(0,98,49,0.08);
  }

  .wc-project-image-card img{
    display:block;
    width:100%;
    height:190px;
    object-fit:cover;
    background:#f4f7f5;
    cursor:zoom-in;
  }

  .wc-project-image-card figcaption{
    padding:9px 11px;
    color:#5a6e7f;
    font-size:13px;
    line-height:1.45;
  }

  .wc-project-lightbox{
    position:fixed;
    inset:0;
    z-index:9999;
    display:none;
    align-items:center;
    justify-content:center;
    padding:28px;
    background:rgba(13,24,38,0.84);
  }

  .wc-project-lightbox.is-open{
    display:flex;
  }

  .wc-project-lightbox-inner{
    position:relative;
    width:min(1100px,100%);
    max-height:90vh;
  }

  .wc-project-lightbox img{
    display:block;
    width:100%;
    max-height:82vh;
    object-fit:contain;
    border-radius:18px;
    background:#ffffff;
    box-shadow:0 24px 70px rgba(0,0,0,0.38);
  }

  .wc-project-lightbox-caption{
    margin-top:12px;
    color:#ffffff;
    font-size:14px;
    line-height:1.45;
    text-align:center;
  }

  .wc-project-lightbox-close{
    position:absolute;
    top:-16px;
    right:-16px;
    width:42px;
    height:42px;
    border:0;
    border-radius:999px;
    background:#ffffff;
    color:#172033;
    font-size:24px;
    line-height:1;
    cursor:pointer;
    box-shadow:0 10px 26px rgba(0,0,0,0.26);
  }

  .wc-project-kicker{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:14px;
    margin-top:28px;
    margin-bottom:32px;
  }

  .wc-project-kicker-item{
    padding:18px;
    border-radius:18px;
    background:#006231;
    border:1px solid #006231;
    box-shadow:0 10px 22px rgba(0,98,49,0.18);
  }

  .wc-project-kicker-item span{
    display:block;
    margin-bottom:7px;
    color:rgba(255,255,255,0.72);
    font-size:10px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-project-kicker-item strong{
    display:block;
    color:#ffffff;
    font-size:15px;
    line-height:1.35;
  }

  .wc-project-grid{
    display:grid;
    grid-template-columns:minmax(0,1.2fr) minmax(280px,.8fr);
    gap:16px;
  }

  .wc-project-panel{
    background:#ffffff;
    border-radius:14px;
    padding:18px;
    border:1px solid rgba(209,190,120,0.34);
    box-shadow:
      0 10px 24px rgba(0,98,49,0.07),
      0 3px 9px rgba(36,52,77,0.05);
  }

  .wc-project-panel h2{
    margin:0 0 14px 0;
    font-size:17px;
    color:#172033;
  }

  .wc-project-panel p{
    margin:0;
  }

  .wc-project-stack{
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  .wc-project-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .wc-project-list-item{
    display:flex;
    justify-content:space-between;
    gap:14px;
    padding:10px 0;
    border-bottom:1px solid rgba(23,32,51,0.08);
  }

  .wc-project-list-item:last-child{
    border-bottom:0;
    padding-bottom:0;
  }

  .wc-project-list-item span{
    color:#5a6e7f;
    font-size:10px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-project-list-item strong{
    color:#172033;
    font-size:13px;
    line-height:1.4;
    text-align:right;
  }

  .wc-project-budget-highlight{
    padding:16px;
    border-radius:12px;
    background:#006231;
    border:1px solid #006231;
    margin-bottom:12px;
    box-shadow:0 10px 20px rgba(0,98,49,0.16);
  }

  .wc-project-budget-highlight span{
    display:block;
    margin-bottom:8px;
    color:rgba(255,255,255,0.72);
    font-size:10px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-project-budget-highlight strong{
    display:block;
    color:#ffffff;
    font-size:23px;
    line-height:1.2;
  }

  .wc-project-staff-value{
    padding:17px;
    border-radius:13px;
    background:linear-gradient(135deg,#006231,#0b7741);
    border:1px solid #006231;
    color:#ffffff;
    box-shadow:0 10px 22px rgba(0,98,49,0.18);
  }

  .wc-project-staff-value span{
    display:block;
    margin-bottom:8px;
    color:rgba(255,255,255,0.72);
    font-size:10px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-project-staff-value .wc-project-staff-label{
    margin-bottom:10px;
  }

  .wc-project-staff-value strong{
    display:block;
    color:#ffffff;
    font-size:24px;
    line-height:1.1;
    margin-bottom:10px;
  }

  .wc-project-staff-value p{
    margin:0;
    color:rgba(255,255,255,0.86);
    font-size:13px;
    line-height:1.5;
  }

  .wc-project-staff-rows{
    margin-top:12px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .wc-project-staff-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:9px 11px;
    border-radius:10px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.16);
  }

  .wc-project-staff-row span{
    margin:0;
    color:rgba(255,255,255,0.74);
    font-size:10px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-project-staff-row strong{
    margin:0;
    color:#ffffff;
    font-size:12px;
    line-height:1.35;
    text-align:right;
  }

  .wc-project-year-breakdown{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-top:12px;
  }

  .wc-project-year-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:9px 11px;
    border-radius:10px;
    background:#f4f7f5;
    border:1px solid rgba(0,98,49,0.08);
  }

  .wc-project-year-row span{
    color:#5a6e7f;
    font-size:10px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-project-year-row strong{
    color:#172033;
    font-size:13px;
    line-height:1.35;
    text-align:right;
  }

  .wc-project-status{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:12px;
    padding:8px 12px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
  }


  .wc-project-status::before{
    content:"";
    width:10px;
    height:10px;
    border-radius:999px;
    background:currentColor;
  }

  .wc-project-highlight-badges{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:12px;
  }

  .wc-project-highlight-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 11px;
    border-radius:999px;
    background:rgba(0,98,49,0.10);
    color:#006231;
    font-size:11px;
    font-weight:700;
    letter-spacing:.04em;
    border:1px solid rgba(0,98,49,0.12);
  }

  .wc-project-highlight-badge::before{
    content:"✔";
    font-size:11px;
    line-height:1;
  }

  .wc-status-planning{
    background:rgba(209,190,120,0.18);
    color:#8b6d12;
  }

  .wc-status-design{
    background:rgba(90,110,127,0.12);
    color:#5a6e7f;
  }

  .wc-status-construction{
    background:rgba(0,98,49,0.12);
    color:#006231;
  }

  .wc-status-complete{
    background:rgba(52,64,84,0.10);
    color:#24344d;
  }

  .wc-project-not-found{
    text-align:center;
    padding:120px 20px;
  }

  .wc-project-timeline{
    position:relative;
    display:flex;
    flex-direction:column;
    gap:12px;
    padding-left:18px;
  }

  .wc-project-timeline::before{
    content:"";
    position:absolute;
    top:5px;
    bottom:5px;
    left:4px;
    width:2px;
    background:rgba(0,98,49,0.16);
  }

  .wc-project-timeline-item{
    position:relative;
  }

  .wc-project-timeline-item::before{
    content:"";
    position:absolute;
    top:5px;
    left:-18px;
    width:10px;
    height:10px;
    border-radius:999px;
    background:#006231;
    box-shadow:0 0 0 4px rgba(0,98,49,0.12);
  }

  .wc-project-timeline-item span{
    display:block;
    margin-bottom:5px;
    color:#5a6e7f;
    font-size:10px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-project-timeline-item strong{
    display:block;
    color:#172033;
    font-size:13px;
    line-height:1.45;
  }

  @media(max-width:900px){

    .wc-project-grid{
      grid-template-columns:1fr;
    }

    .wc-project-title{
      font-size:30px;
    }

    .wc-project-kicker{
      grid-template-columns:repeat(2,minmax(0,1fr));
    }

  }

  @media(max-width:700px){

    .wc-project-page{
      padding:22px 14px 46px;
    }

    .wc-project-hero,
    .wc-project-panel{
      padding:16px;
      border-radius:14px;
    }

    .wc-project-title{
      font-size:25px;
    }

    .wc-project-description{
      font-size:14px;
    }

    .wc-project-actions{
      align-items:stretch;
    }

    .wc-project-back,
    .wc-project-full-search{
      width:100%;
    }

    .wc-project-kicker{
      grid-template-columns:1fr;
    }

    .wc-project-list-item{
      display:block;
    }

    .wc-project-list-item strong{
      display:block;
      margin-top:6px;
      text-align:left;
    }

    .wc-project-year-row{
      display:block;
    }

    .wc-project-year-row strong{
      display:block;
      margin-top:6px;
      text-align:left;
    }

    .wc-project-staff-row{
      display:block;
    }

    .wc-project-staff-row strong{
      display:block;
      margin-top:6px;
      text-align:left;
    }

    .wc-project-metrics{
      grid-template-columns:1fr;
    }

    .wc-project-image-grid{
      grid-template-columns:1fr;
    }

    .wc-project-image-card img{
      height:180px;
    }

    .wc-project-lightbox{
      padding:18px;
    }

    .wc-project-lightbox-close{
      top:10px;
      right:10px;
    }

  }


</style>
<div id="app"></div>
<script src="../assets/walton-cip-projects.js"></script>
<script src="../assets/walton-cip-project.js"></script>
  </main>
</div>
