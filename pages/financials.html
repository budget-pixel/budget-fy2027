<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Financials — Walton County FY 2027 Budget</title>
<link rel="stylesheet" href="../assets/style.css?v=20260625-chart-wrap-fix">
</head>
<body>

<!-- nav#nav-menu.nav-menu is the hook walton-budget-nav.js uses for logo + search injection -->
<nav id="nav-menu" class="nav-menu">
  <div class="logo-container"></div>
</nav>

<div id="layout">
<main id="content">

<div class="page-eyebrow">Financials</div>
<h1 class="page-title">Financials</h1>
<p class="page-intro">Browse revenue, expense, personnel, fund, capital equipment, debt, forecast, and supplemental financial information for Walton County's budget.</p>

<section aria-label="Financial directory">
  <ul class="wc-directory-list" id="hubList"></ul>
</section>

</main>
</div>

<script src="../assets/walton-budget-search-data.js"></script>
<script src="../assets/budget-data.js?v=20260626-personnel-left-mobile"></script>
<script src="../assets/walton-budget-nav.js?v=20260626-personnel-left-mobile"></script>
<script src="../assets/walton-budget-pdf.js"></script>
<script>
  (function(){
    var pages = [
      {
        title:"Consolidated Financial Schedules",
        href:"consolidated-financial-schedules.html",
        label:"All Funds",
        description:"Review combined County financial schedules across funds, revenues, expenses, transfers, and balances."
      },
      {
        title:"Fund Financial Schedules",
        href:"fund-financial-schedules.html",
        label:"Fund Detail",
        description:"Explore fund-level financial schedules for major operating, special revenue, and capital funds."
      },
      {
        title:"Summary of Revenues",
        href:"summary-of-revenues.html",
        label:"Revenues",
        description:"Understand major revenue sources including property taxes, sales taxes, tourist development taxes, and other revenues."
      },
      {
        title:"Summary of Expenses",
        href:"summary-of-expenses.html",
        label:"Expenses",
        description:"Browse expenditure summaries by function, fund, and budget category for the proposed fiscal year."
      },
      {
        title:"Summary of Interfund Transfers",
        href:"summary-of-interfund-transfers.html",
        label:"Transfers",
        description:"Review planned transfers between funds and how resources move to support operations and capital needs."
      },
      {
        title:"Summary of Personnel",
        href:"summary-of-personnel.html",
        label:"Personnel",
        description:"See staffing summaries and position counts supporting County services, programs, and operations.",
        showFteCallouts:true
      },
      {
        title:"Summary of Machinery, Vehicles & Equipment",
        href:"summary-of-machinery-vehicles-and-equipment.html",
        label:"Equipment",
        description:"Review planned machinery, vehicle, and equipment investments included in the budget."
      },
      {
        title:"Debt Overview",
        href:"debt-overview.html",
        label:"Debt",
        description:"Explore outstanding debt, debt service, borrowing strategy, and long-term obligations."
      },
      {
        title:"Financial Forecast",
        href:"financial-forecast.html",
        label:"Forecast",
        description:"Review long-range financial assumptions, revenue outlook, expense projections, and planning considerations."
      }
    ];

    function $(selector){
      return document.querySelector(selector);
    }

    function escapeHtml(value){
      return String(value === undefined || value === null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // Bouncing-dots markup shown in place of a real fund chip while
    // loadBudgetData() is in flight (see style.css's .wc-loading-dots) --
    // otherwise this row shows nothing at all until data loads, then pops
    // in afterward and shifts the rows below it.
    var LOADING_DOTS_HTML = '<span class="wc-loading-dots" aria-hidden="true"><span></span><span></span><span></span></span>';

    // Each chip is its own link (not nested inside the row's own
    // wc-directory-item anchor -- browsers don't support nested links) to
    // the Personnel page pre-filtered to that fund, so clicking a callout
    // both navigates there and applies that filter immediately (see the
    // ?fund= read in initPersonnelSummaryPage).
    function personnelCalloutsHtml(href, callouts){
      if(!callouts || !callouts.length) return "";
      return '<div class="wc-personnel-fund-stats wc-personnel-fund-stats--compact">' +
        callouts.map(function(c){
          return '<a class="wc-personnel-fund-stat" href="' + escapeHtml(href) + '?fund=' + encodeURIComponent(c.label) + '">' +
            '<strong>' + escapeHtml(window.WCBudgetData.formatNumber(c.total)) + '</strong><span>' + escapeHtml(c.label) + '</span></a>';
        }).join("") +
        '</div>';
    }

    // The real chip labels depend on the loaded staffing data (see
    // getPersonnelFundCallouts), but the real COUNT is fixed -- 7 named
    // groups (Board of County Commissioners, Circuit Court, Clerk of
    // Court, Tax Collector, Property Appraiser, Supervisor of Elections,
    // Sheriff Fund) plus 7 actual funds (General Fund (Board
    // Departments), Transportation, Tourist Development, Solid Waste,
    // Building, Mosquito Control, Housing & Urban Development) -- see
    // PERSONNEL_NAMED_CALLOUT_GROUPS in budget-data.js. Rendering that
    // many inert placeholder chips (not real links -- href="#", not
    // focusable) up front means this row already occupies its eventual
    // two-row height before the data loads, instead of growing/shifting
    // the page once it does.
    function personnelCalloutsLoadingHtml(){
      var placeholderCount = 14;
      var chips = "";
      for(var i = 0; i < placeholderCount; i++){
        chips += '<a class="wc-personnel-fund-stat" href="#" aria-hidden="true" tabindex="-1">' +
          '<strong>' + LOADING_DOTS_HTML + '</strong><span>&nbsp;</span></a>';
      }
      return '<div class="wc-personnel-fund-stats wc-personnel-fund-stats--compact">' + chips + '</div>';
    }

    function renderHub(personnelCallouts, isLoading){
      $("#hubList").innerHTML = pages.map(function(page){
        var calloutsHtml = page.showFteCallouts
          ? (isLoading ? personnelCalloutsLoadingHtml() : personnelCalloutsHtml(page.href, personnelCallouts))
          : "";
        return '<li>' +
          '<a class="wc-directory-item" href="' + escapeHtml(page.href) + '">' +
            '<div class="wc-directory-item-main">' +
              '<span class="wc-directory-item-title">' + escapeHtml(page.title) + '</span>' +
              '<span class="wc-directory-item-desc">' + escapeHtml(page.description) + '</span>' +
            '</div>' +
            '<span class="wc-directory-item-arrow" aria-hidden="true">&rarr;</span>' +
          '</a>' +
          calloutsHtml +
        '</li>';
      }).join("");
    }

    document.addEventListener("DOMContentLoaded", function(){
      renderHub([], true);
      if(window.WCBudgetData && typeof window.WCBudgetData.loadBudgetData === "function"){
        window.WCBudgetData.loadBudgetData()
          .then(function(data){
            var staffing = Array.isArray(data && data.staffing) ? data.staffing : [];
            var callouts = staffing.length ? window.WCBudgetData.getPersonnelFundCallouts(staffing) : [];
            renderHub(callouts, false);
          })
          .catch(function(){ renderHub([], false); });
      }
    });
  })();
</script>
</body>
</html>
