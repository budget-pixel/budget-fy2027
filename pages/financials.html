<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Financials — Walton County FY 2027 Budget</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<!-- nav#nav-menu.nav-menu is the hook walton-budget-nav.js uses for logo + search injection -->
<nav id="nav-menu" class="nav-menu">
  <div class="logo-container"></div>
</nav>

<div id="layout">
<main id="content">

<div class="page-eyebrow">Financials</div>
<h1 class="page-title">Financials</h1>
<p class="page-intro">Browse revenue, expense, personnel, fund, capital equipment, debt, forecast, and supplemental financial information for Walton County's FY 2027 proposed budget.</p>

<section aria-label="Financial directory">
  <div class="wc-directory-tools">
    <label class="wc-directory-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35m0 0A7.5 7.5 0 1 0 6.15 6.15a7.5 7.5 0 0 0 10.5 10.5Z"></path>
      </svg>
      <input id="hubSearch" type="search" placeholder="Search Financials..." autocomplete="off" aria-label="Search financials">
    </label>
    <div class="wc-directory-count" id="hubResultCount">Loading financial pages</div>
  </div>
  <div class="wc-directory-empty" id="hubEmpty">No financial pages match that search.</div>
  <ul class="wc-directory-list" id="hubList"></ul>
</section>

</main>
</div>

<script src="../assets/walton-budget-search-data.js"></script>
<script src="../assets/budget-data.js"></script>
<script src="../assets/walton-budget-nav.js"></script>
<script src="../assets/walton-budget-pdf.js"></script>
<script>
  (function(){
    var pages = [
      {
        title:"Consolidated Financial Schedules",
        href:"consolidated-financial-schedules.html",
        label:"All Funds",
        description:"Review combined County financial schedules across funds, revenues, expenses, transfers, and balances."
      },
      {
        title:"Fund Financial Schedules",
        href:"fund-financial-schedules.html",
        label:"Fund Detail",
        description:"Explore fund-level financial schedules for major operating, special revenue, enterprise, and capital funds."
      },
      {
        title:"Summary of Revenues",
        href:"summary-of-revenues.html",
        label:"Revenues",
        description:"Understand major revenue sources including property taxes, sales taxes, tourist development taxes, and other revenues."
      },
      {
        title:"Summary of Expenses",
        href:"summary-of-expenses.html",
        label:"Expenses",
        description:"Browse expenditure summaries by function, fund, and budget category for the proposed fiscal year."
      },
      {
        title:"Summary of Interfund Transfers",
        href:"summary-of-interfund-transfers.html",
        label:"Transfers",
        description:"Review planned transfers between funds and how resources move to support operations and capital needs."
      },
      {
        title:"Summary of Personnel",
        href:"summary-of-personnel.html",
        label:"Personnel",
        description:"See staffing summaries and position counts supporting County services, programs, and operations."
      },
      {
        title:"Summary of Machinery, Vehicles & Equipment",
        href:"summary-of-machinery-vehicles-and-equipment.html",
        label:"Equipment",
        description:"Review planned machinery, vehicle, and equipment investments included in the FY 2027 proposed budget."
      },
      {
        title:"Debt Overview",
        href:"debt-overview.html",
        label:"Debt",
        description:"Explore outstanding debt, debt service, borrowing strategy, and long-term obligations."
      },
      {
        title:"Financial Forecast",
        href:"financial-forecast.html",
        label:"Forecast",
        description:"Review long-range financial assumptions, revenue outlook, expense projections, and planning considerations."
      }
    ];

    function $(selector){
      return document.querySelector(selector);
    }

    function escapeHtml(value){
      return String(value === undefined || value === null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function normalize(value){
      return String(value || "")
        .toLowerCase()
        .replace(/&/g, " and ")
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function renderHub(){
      var query = normalize($("#hubSearch").value);
      var matches = pages.filter(function(page){
        return !query || normalize(page.title + " " + page.label + " " + page.description).indexOf(query) !== -1;
      });
      $("#hubResultCount").textContent = matches.length + " of " + pages.length + " pages";
      $("#hubEmpty").classList.toggle("is-visible", matches.length === 0);
      $("#hubList").innerHTML = matches.map(function(page){
        return '<li><a class="wc-directory-item" href="' + escapeHtml(page.href) + '">' +
          '<div class="wc-directory-item-main">' +
            '<span class="wc-directory-item-title">' + escapeHtml(page.title) + '</span>' +
            '<span class="wc-directory-item-desc">' + escapeHtml(page.description) + '</span>' +
          '</div>' +
          '<span class="wc-directory-item-arrow" aria-hidden="true">&rarr;</span>' +
        '</a></li>';
      }).join("");
    }

    document.addEventListener("DOMContentLoaded", function(){
      renderHub();
      $("#hubSearch").addEventListener("input", renderHub);
    });
  })();
</script>
</body>
</html>
