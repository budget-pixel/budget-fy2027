<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Capital Projects — Walton County FY 2027 Budget</title>
<link rel="stylesheet" href="../assets/style.css?v=20260625-chart-wrap-fix">
</head>
<body>

<!-- nav#nav-menu.nav-menu is the hook walton-budget-nav.js uses for logo + search injection -->
<nav id="nav-menu" class="nav-menu">
  <div class="logo-container"></div>
</nav>

<div id="layout">
<main id="content">

<div class="page-eyebrow">Capital Projects</div>
<h1 class="page-title">Capital Projects</h1>
<p class="page-intro">Explore Walton County's capital improvement plan, fund schedules, and searchable project detail.</p>

<section aria-label="Capital projects directory">
  <ul class="wc-directory-list" id="capitalDirectory"></ul>
</section>

</main>
</div>

<script src="../assets/walton-budget-search-data.js"></script>
<script src="../assets/walton-cip-projects.js?v=20260622-project-images-v3"></script>
<script src="../assets/walton-budget-nav.js?v=20260622-search-dot-cleanup"></script>
<script src="../assets/walton-budget-pdf.js"></script>
<script>
  (function(){
    // "funding" matches each fund schedule page's own renderFundSchedule
    // config (see walton-cip-fund-schedule.js) so the stats shown here are
    // computed the exact same way as that page's own FY2027 callouts.
    var pages = [
      {
        title:"Capital Improvement Plan Overview",
        href:"capital-improvement-plan.html",
        description:"Review the County's capital improvement plan overview, priorities, totals, and project portfolio context."
      },
      {
        title:"Project Search",
        href:"search.html",
        description:"Search capital projects by name, fund, department, district, and project detail."
      },
      {
        title:"Capital Projects Fund Schedule",
        href:"cip-capital-projects.html",
        description:"View the capital projects fund schedule and related project appropriations.",
        funding:"capital projects fund"
      },
      {
        title:"Transportation Fund Schedule",
        href:"cip-transportation.html",
        description:"Review transportation capital investments, road work, and infrastructure schedules.",
        funding:"transportation fund"
      },
      {
        title:"Sheriff Fund Schedule",
        href:"cip-sheriff.html",
        description:"Review capital projects associated with Sheriff and public safety funding.",
        funding:"sheriff fund"
      },
      {
        title:"Tourist Development Fund Schedule",
        href:"cip-tourist-development.html",
        description:"Explore tourism-related capital investments funded through tourist development resources.",
        funding:"tourist development fund"
      },
      {
        title:"Grant Funded Schedule",
        href:"cip-grants.html",
        description:"Browse capital projects supported by federal, state, and other grant funding sources.",
        funding:"grant funded"
      }
    ];

    function escapeHtml(value){
      return String(value === undefined || value === null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatMoneyShort(value){
      var amount = Number(value) || 0;
      var abs = Math.abs(amount);
      if(abs >= 1000000){
        return "$" + (amount / 1000000).toLocaleString("en-US", { maximumFractionDigits:1 }) + "M";
      }
      if(abs >= 1000){
        return "$" + (amount / 1000).toLocaleString("en-US", { maximumFractionDigits:0 }) + "K";
      }
      return "$" + Math.round(amount).toLocaleString("en-US");
    }

    function isLegacyInHouseEngineeringRow(project){
      var title = String(project.title || "").toLowerCase();
      var accountCode = String(project.budget_account_code || "").trim();
      return Boolean(project.is_legacy_in_house_engineering_row) ||
        title.indexOf("in-house engineering") !== -1 ||
        accountCode === "534000";
    }

    function getFy2027Amount(project){
      var rows = Array.isArray(project.funding_by_year) ? project.funding_by_year : [];
      var fy2027 = rows.filter(function(r){ return r.year === "FY2027"; });
      return fy2027.reduce(function(sum, r){ return sum + (Number(r.amount_value) || 0); }, 0);
    }

    function getInHouseEngineeringAmount(project){
      if(Number(project.in_house_engineering_value || 0) > 0){
        return Number(project.in_house_engineering_value) || 0;
      }
      var rows = Array.isArray(project.in_house_engineering_rows) ? project.in_house_engineering_rows : [];
      return rows.reduce(function(sum, r){ return sum + (Number(r.amount_value) || 0); }, 0);
    }

    // Bouncing-dots markup shown in place of a real stat value while
    // wcCipProjectsReady hasn't resolved yet (see style.css's
    // .wc-loading-dots) -- otherwise renderDirectory([]) renders real-
    // looking "$0"/"0" stats immediately, which then jump to their real
    // values once project data loads instead of reading as still-loading.
    var LOADING_DOTS_HTML = '<span class="wc-loading-dots" aria-hidden="true"><span></span><span></span><span></span></span>';

    function statHtml(modifierClass, value, label){
      return '<div class="wc-directory-item-stat ' + modifierClass + '"><strong>' + value + '</strong><span>' + escapeHtml(label) + '</span></div>';
    }

    function fundStatsHtml(funding, allProjects, isLoading){
      if(isLoading){
        return statHtml("wc-directory-item-stat--fund-budget", LOADING_DOTS_HTML, "FY 2027 Budget") +
          statHtml("wc-directory-item-stat--fund-projects", LOADING_DOTS_HTML, "Number of Projects") +
          statHtml("wc-directory-item-stat--fund-inhouse", LOADING_DOTS_HTML, "In-House Engineering");
      }
      var matching = allProjects.filter(function(p){
        return String(p.funding || "").toLowerCase() === funding && !isLegacyInHouseEngineeringRow(p);
      });
      var budgetTotal = matching.reduce(function(sum, p){ return sum + getFy2027Amount(p); }, 0);
      var projectCount = matching.filter(function(p){ return getFy2027Amount(p) > 0; }).length;
      var inHouseTotal = matching.reduce(function(sum, p){ return sum + getInHouseEngineeringAmount(p); }, 0);

      return statHtml("wc-directory-item-stat--fund-budget", escapeHtml(formatMoneyShort(budgetTotal)), "FY 2027 Budget") +
        statHtml("wc-directory-item-stat--fund-projects", escapeHtml(projectCount.toLocaleString("en-US")), "Number of Projects") +
        statHtml("wc-directory-item-stat--fund-inhouse", escapeHtml(formatMoneyShort(inHouseTotal)), "In-House Engineering");
    }

    function renderDirectory(allProjects, isLoading){
      var list = document.getElementById("capitalDirectory");
      if(!list) return;

      list.innerHTML = pages.map(function(page){
        var statsHtml = page.funding ? '<div class="wc-directory-item-meta">' + fundStatsHtml(page.funding, allProjects, isLoading) + '</div>' : "";
        return '<li><a class="wc-directory-item" href="' + escapeHtml(page.href) + '">' +
          '<div class="wc-directory-item-main">' +
            '<span class="wc-directory-item-title">' + escapeHtml(page.title) + '</span>' +
            '<span class="wc-directory-item-desc">' + escapeHtml(page.description) + '</span>' +
          '</div>' +
          statsHtml +
          '<span class="wc-directory-item-arrow" aria-hidden="true">&rarr;</span>' +
        '</a></li>';
      }).join("");
    }

    document.addEventListener("DOMContentLoaded", function(){
      renderDirectory([], true);
      var ready = window.wcCipProjectsReady || Promise.resolve(window.wcCipProjects || []);
      ready.then(function(projects){
        renderDirectory(Array.isArray(projects) ? projects : (window.wcCipProjects || []), false);
      }).catch(function(){
        renderDirectory(window.wcCipProjects || [], false);
      });
    });
  })();
</script>
</body>
</html>
